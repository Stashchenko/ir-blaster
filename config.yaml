esphome:
  name: irblaster
  friendly_name: IRBlaster

esp32:
  board: esp32-c3-devkitm-1
  framework:
    type: esp-idf

# Enable logging
logger:

# Enable Home Assistant API
api:
  encryption:
    key: "2SYEsCTpJQIUVtACWcTgglW0qP6iNojwyk+laTnQzjg="

ota:
  - platform: esphome
    password: "134eee73677d884812f723b24ab7400f"

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: "Irblaster Fallback Hotspot"
    password: "JUXLesNe9bPp"

captive_portal:

# 🔌 I2C
i2c:
  sda: GPIO4
  scl: GPIO5
  scan: true

remote_transmitter:
  id: ir_tx
  pin: GPIO7
  carrier_duty_percent: 80%

remote_receiver:
  id: rcvr
  pin:
    number: GPIO6
    inverted: true
    mode:
      input: true
      pullup: true
  tolerance: 55%
  dump: all

number:
  - platform: template
    name: "Offset temperature"
    id: temp_offset
    min_value: -5
    max_value: 5
    step: 0.1
    initial_value: 0.0
    restore_value: true
    optimistic: true

  - platform: template
    name: "Offset humidity"
    id: hum_offset
    min_value: -20
    max_value: 20
    step: 0.5
    initial_value: 0.0
    restore_value: true
    optimistic: true
    
binary_sensor:
  - platform: status                                # device status notified to home assistant for automations
    name: "Device Status"
 
sensor:
  - platform: wifi_signal                      
    name: "WiFi Signal"
    update_interval: 60s
    id: wifi_signal_db
    entity_category: "diagnostic"
    internal: true  # hide this sensor to HA,
 
  - platform: copy
    source_id: wifi_signal_db
    name: "WiFi Signal Percent"
    icon: mdi:wifi
    filters:
      - lambda: return min(max(2 * (x + 100.0), 0.0), 100.0);
    unit_of_measurement: " %"
    entity_category: "diagnostic"
    device_class: ""

  - platform: aht10
    variant: AHT20
    temperature:
      name: "Temperature"
      id: room_temperature
      filters:
        - lambda: return x + id(temp_offset).state;
    humidity:
      name: "Humidity"
      id: room_humidity
      filters:
        - lambda: return x + id(hum_offset).state;
    update_interval: 30s

  - platform: bmp280_i2c
    pressure:
      name: "Pressure"
    address: 0x77
    update_interval: 30s  

climate:
  - platform: heatpumpir
    name: "Samsung AQV"
    transmitter_id: ir_tx
    receiver_id: rcvr
    protocol: samsung_aqv
    sensor: room_temperature
    humidity_sensor: room_humidity
    min_temperature: 16
    max_temperature: 30
    horizontal_default: middle
    vertical_default: middle
